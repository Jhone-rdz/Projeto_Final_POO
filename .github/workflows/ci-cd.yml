name: CI-CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: reserveaqui_ci
          POSTGRES_USER: reserveaqui_ci
          POSTGRES_PASSWORD: reserveaqui_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U reserveaqui_ci -d reserveaqui_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost,http://127.0.0.1
      DB_ENGINE: postgres
      POSTGRES_DB: reserveaqui_ci
      POSTGRES_USER: reserveaqui_ci
      POSTGRES_PASSWORD: reserveaqui_ci
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      CORS_ALLOW_ALL_ORIGINS: "True"
      CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
      FRONTEND_URL: http://localhost

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: Backend/requirements.txt

      - name: Install dependencies
        working-directory: Backend
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: Backend/reserveaqui
        run: python manage.py migrate --noinput

      - name: Django check
        working-directory: Backend/reserveaqui
        run: python manage.py check

      - name: Run backend tests
        working-directory: Backend/reserveaqui
        run: python manage.py test

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/ReserveAqui/package-lock.json

      - name: Install dependencies
        working-directory: Frontend/ReserveAqui
        run: npm ci

      - name: Build frontend
        working-directory: Frontend/ReserveAqui
        run: npm run build

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: false
          tags: reserveaqui-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend/ReserveAqui
          file: ./Frontend/ReserveAqui/Dockerfile
          push: false
          tags: reserveaqui-frontend:ci

  publish:
    name: Publish images to Docker Hub
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/reserveaqui-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/reserveaqui-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/reserveaqui-backend:${{ github.ref_name }}

      - name: Push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend/ReserveAqui
          file: ./Frontend/ReserveAqui/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/reserveaqui-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/reserveaqui-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/reserveaqui-frontend:${{ github.ref_name }}

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [publish]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != '' && secrets.DEPLOY_PATH != ''

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch --all
            git checkout main
            git pull origin main
            cp -n .env.example .env || true
            docker compose build
            docker compose up -d
            docker compose exec -T backend python manage.py migrate --noinput
            docker compose exec -T backend python manage.py collectstatic --noinput
            docker compose ps
