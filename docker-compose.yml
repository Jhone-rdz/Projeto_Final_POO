services:
  db:
    image: postgres:16-alpine
    container_name: reserveaqui-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: reserveaqui-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - django_static:/app/staticfiles
    expose:
      - "8000"

  frontend:
    build:
      context: ./Frontend/ReserveAqui
      dockerfile: Dockerfile
    container_name: reserveaqui-frontend-build
    restart: "no"
    volumes:
      - frontend_dist:/frontend-dist
    # Copia os arquivos estáticos gerados para o volume nomeado quando o container for criado.
    # O container usa a imagem final (nginx) que já contém /usr/share/nginx/html.
    # O comando abaixo copia esses arquivos para o volume e então finaliza.
    command: sh -c "cp -r /usr/share/nginx/html/. /frontend-dist && echo 'frontend assets copied'"

  nginx:
    image: nginx:1.27-alpine
    container_name: reserveaqui-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - django_static:/var/www/backend/static:ro

volumes:
  postgres_data:
  django_static:
  frontend_dist:
